services:
  loxhuebridge:
    # WICHTIG: Hier steht jetzt der neue, offizielle Image-Name
    image: ghcr.io/bausi2k/loxone-hue-bridge:latest
    
    container_name: loxhuebridge
    restart: always
    
    # WICHTIG für Loxone UDP Kommunikation
    network_mode: "host"
    
    environment:
      - TZ=Europe/Vienna
      
    volumes:
      # Nur noch der Data-Ordner ist wichtig
      - ./data:/app/data